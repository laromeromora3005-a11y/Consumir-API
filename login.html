<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <style>
    body {
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #2196f3;
    }

    .login-box {
      background: white;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
    }

    input {
      display: block;
      margin: 10px auto;
      padding: 10px;
      width: 200px;
    }

    button {
      padding: 10px;
      background: #4caf50;
      color: white;
      border: none;
    }
  </style>
</head>
<body>

  <div class="login-box">
    <h2>Iniciar sesión</h2>
    <input type="text" id="user" placeholder="Usuario">
    <input type="password" id="pass" placeholder="Contraseña">
    <button onclick="login()">Entrar</button>
    <p id="error"></p>
  </div>

  <script>
    function login() {
      const user = document.getElementById("user").value;
      const pass = document.getElementById("pass").value;

      // usuario de prueba
      if (user === "admin" && pass === "1234") {
        localStorage.setItem("auth", "true");
        window.location.href = "index.html";
      } else {
        document.getElementById("error").textContent = "Datos incorrectos";
      }
    }
  </script>

</body>
</html>
